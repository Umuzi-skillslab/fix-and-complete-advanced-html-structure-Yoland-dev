<!DOCTYPE html>
<html lang="en">

<head>
    <title>Contact</title>
    <link rel="stylesheet" href="css/styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="top">
        <h1>Contact Us</h1>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="media.html">Media</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </div>

    <div>
        <h2>Get In Touch</h2>

        <form>
            <fieldset>
                <legend>Contact Us</legend>

                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Email" required>

                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="Phone" pattern="[0-9]{10}" required>

                <label for="date">Preferred Contact Date</label>
                <input type="date" id="date" name="date">

                <label for="budget">Budget (R)</label>
                <input type="number" id="budget" name="budget" min="0">

                <label for="service">Service Required</label>
                <select id="service" name="service">
                    <option value="">Select a service</option>
                    <option value="video">Video Production</option>
                    <option value="photography">Photography</option>
                    <option value="editing">Editing</option>
                </select>

                <p>Preferred Contact Method:</p>
                <label>
                    <input type="radio" name="contactMethod" value="email" required> Email
                </label>
                <label>
                    <input type="radio" name="contactMethod" value="phone"> Phone
                </label>

                <label>
                    <input type="checkbox" name="subscribe"> Subscribe to newsletter
                </label>

                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Your message" required></textarea>

            </fieldset>

            <button type="submit">Submit</button>
        </form>
    </div>

    <div class="bottom">
        <p>Email: contact@mediaproduction.com</p>
    </div>
</body>

</html>
